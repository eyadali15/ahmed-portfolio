  # ─── CONTACT PAGE ───
  - name: "contact"
    label: "✉️ Contact Page"
    files:
      - label: "Contact Page Sections"
        name: "contact"
        file: "src/content/pages/contact.json"
        fields:
          - label: "1️⃣ Page Header"
            name: "header"
            widget: "object"
            collapsed: true
            fields:
              - label: "📝 Content"
                name: "content"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
              - label: "🔤 Element Spacing"
                name: "elements"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Label → margin bottom (px)", name: "labelMarginBottom", widget: "number", default: 20 }
                  - { label: "Title → margin bottom (px)", name: "titleMarginBottom", widget: "number", default: 24 }
                  - { label: "Divider → margin bottom (px)", name: "dividerMarginBottom", widget: "number", default: 24 }
                  - { label: "Description → margin bottom (px)", name: "descriptionMarginBottom", widget: "number", default: 0 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "▸ Position", name: "align", widget: "select", options: ["left", "center", "right"], default: "center" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 64 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 0 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 0 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 0 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 80 }
