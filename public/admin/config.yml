#local_backend: true

backend:
  name: github
  repo: eyadali15/ahmed-portfolio
  branch: main
  base_url: https://ahmadhany.com
  auth_endpoint: api/auth

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  # ─── PROJECTS ───
  - name: "projects"
    label: "🎬 Projects"
    label_singular: "Project"
    folder: "src/content/projects"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    summary: "{{title}} — {{client}} ({{year}})"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "URL Slug", name: "slug", widget: "string" }
      - { label: "Client", name: "client", widget: "string" }
      - { label: "Your Role", name: "role", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: [{ label: "Commercial", value: "commercial" }, { label: "Film", value: "film" }, { label: "Documentary", value: "documentary" }] }
      - { label: "Year", name: "year", widget: "number", value_type: "int", min: 2015, max: 2030 }
      - { label: "Vimeo Video ID", name: "vimeoId", widget: "string" }
      - { label: "Thumbnail Image", name: "thumbnail", widget: "image", required: true }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Featured on Homepage?", name: "featured", widget: "boolean", default: false }
      - { label: "Credits", name: "credits", widget: "list", summary: "{{fields.role}} — {{fields.name}}", fields: [{ label: "Role", name: "role", widget: "string" }, { label: "Name", name: "name", widget: "string" }] }

  # ─── HOME PAGE ───
  - name: "home"
    label: "🏠 Home Page"
    files:
      - label: "Home Page Sections"
        name: "home"
        file: "src/content/pages/home.json"
        fields:
          - label: "1️⃣ Hero Section"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - label: "📝 Content"
                name: "content"
                widget: "object"
                fields:
                  - { label: "Subtitle", name: "subtitle", widget: "string" }
                  - { label: "Description", name: "description", widget: "string" }
                  - { label: "🎬 Hero Video Background", name: "heroVideo", widget: "file", default: "/videos/banner.mp4", hint: "Upload MP4 video for the hero section background" }
                  - { label: "🎬 Banner Video (mid-page)", name: "bannerVideo", widget: "file", default: "/videos/banner.mp4", hint: "Upload MP4 video for the video banner section" }
              - label: "🔤 Element Spacing"
                name: "elements"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Title → margin bottom (px)", name: "titleMarginBottom", widget: "number", default: 36 }
                  - { label: "Subtitle → margin bottom (px)", name: "subtitleMarginBottom", widget: "number", default: 20 }
                  - { label: "Divider → margin Y (px)", name: "dividerMarginY", widget: "number", default: 24 }
                  - { label: "Description → margin bottom (px)", name: "descriptionMarginBottom", widget: "number", default: 36 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "▸ Position", name: "align", widget: "select", options: ["left", "center", "right"], default: "center" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 0 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 0 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 24 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 24 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 0 }
                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
                  - { label: "Margin Right", name: "marginRight", widget: "number", default: 0 }
                  - { label: "Grid Gap", name: "gridGap", widget: "number", default: 0 }
                  - { label: "Gap After Section", name: "gapAfter", widget: "number", default: 0 }

          - label: "2️⃣ Featured Projects"
            name: "featured"
            widget: "object"
            collapsed: true
            fields:
              - label: "📝 Content"
                name: "content"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
              - label: "🔤 Element Spacing"
                name: "elements"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Label → margin bottom (px)", name: "labelMarginBottom", widget: "number", default: 12 }
                  - { label: "Title → margin bottom (px)", name: "titleMarginBottom", widget: "number", default: 0 }
                  - { label: "Title → Grid gap (px)", name: "titleToGridGap", widget: "number", default: 80 }
                  - { label: "Grid → Button gap (px)", name: "gridToButtonGap", widget: "number", default: 112 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "▸ Title Position", name: "align", widget: "select", options: ["left", "center", "right"], default: "left" }
                  - { label: "▸ Button Position", name: "buttonAlign", widget: "select", options: ["left", "center", "right"], default: "center" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 160 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 160 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 0 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 0 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 0 }
                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
                  - { label: "Margin Right", name: "marginRight", widget: "number", default: 0 }
                  - { label: "Grid Gap", name: "gridGap", widget: "number", default: 40 }
                  - { label: "Gap After Section", name: "gapAfter", widget: "number", default: 0 }

          - label: "3️⃣ Call to Action"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - label: "📝 Content"
                name: "content"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Button Text", name: "buttonText", widget: "string" }
              - label: "🔤 Element Spacing"
                name: "elements"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Label → margin bottom (px)", name: "labelMarginBottom", widget: "number", default: 32 }
                  - { label: "Title → margin bottom (px)", name: "titleMarginBottom", widget: "number", default: 40 }
                  - { label: "Description → padding top (px)", name: "descriptionPaddingTop", widget: "number", default: 36 }
                  - { label: "Description → margin bottom (px)", name: "descriptionMarginBottom", widget: "number", default: 96 }
                  - { label: "Button → margin top (px)", name: "buttonMarginTop", widget: "number", default: 20 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "▸ Position", name: "align", widget: "select", options: ["left", "center", "right"], default: "center" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 176 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 176 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 0 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 0 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 0 }
                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
                  - { label: "Margin Right", name: "marginRight", widget: "number", default: 0 }
                  - { label: "Grid Gap", name: "gridGap", widget: "number", default: 0 }
                  - { label: "Gap After Section", name: "gapAfter", widget: "number", default: 0 }

  # ─── ABOUT PAGE ───
  - name: "about"
    label: "👤 About Page"
    files:
