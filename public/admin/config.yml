                  - { label: "Divider → margin bottom (px)", name: "dividerMarginBottom", widget: "number", default: 32 }
                  - { label: "Paragraph 1 → margin bottom (px)", name: "text1MarginBottom", widget: "number", default: 24 }
                  - { label: "Paragraph 2 → margin bottom (px)", name: "text2MarginBottom", widget: "number", default: 0 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "▸ Position", name: "align", widget: "select", options: ["left", "center", "right"], default: "left" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 80 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 80 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 0 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 0 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 0 }
                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
                  - { label: "Margin Right", name: "marginRight", widget: "number", default: 0 }
                  - { label: "Grid Gap", name: "gridGap", widget: "number", default: 0 }
                  - { label: "Gap After Section", name: "gapAfter", widget: "number", default: 0 }

          - label: "3️⃣ Photo Gallery"
            name: "gallery"
            widget: "object"
            collapsed: true
            fields:
              - label: "📝 Content"
                name: "content"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Photos", name: "photos", widget: "list", field: { label: "Photo", name: "photo", widget: "image" } }
              - label: "🔤 Element Spacing"
                name: "elements"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Label → margin bottom (px)", name: "labelMarginBottom", widget: "number", default: 16 }
                  - { label: "Title → margin bottom (px)", name: "titleMarginBottom", widget: "number", default: 48 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "▸ Position", name: "align", widget: "select", options: ["left", "center", "right"], default: "left" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 96 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 96 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 0 }
