#local_backend: true

backend:
  name: github
  repo: eyadali15/ahmed-portfolio
  branch: main
  base_url: https://ahmadhany.com
  auth_endpoint: api/auth

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  # ─── PROJECTS ───
  - name: "projects"
    label: "🎬 Projects"
    label_singular: "Project"
    folder: "src/content/projects"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    summary: "{{title}} — {{client}} ({{year}})"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "URL Slug", name: "slug", widget: "string" }
      - { label: "Client", name: "client", widget: "string" }
      - { label: "Your Role", name: "role", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: [{ label: "Commercial", value: "commercial" }, { label: "Film", value: "film" }, { label: "Documentary", value: "documentary" }] }
      - { label: "Year", name: "year", widget: "number", value_type: "int", min: 2015, max: 2030 }
      - { label: "Vimeo Video ID", name: "vimeoId", widget: "string", hint: "Enter the Vimeo video ID. Thumbnail will be auto-generated if left empty below." }
      - { label: "Thumbnail Image", name: "thumbnail", widget: "image", required: false, hint: "Leave empty to auto-use Vimeo thumbnail (https://vumbnail.com/{vimeoId}.jpg)" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Featured on Homepage?", name: "featured", widget: "boolean", default: false }
      - { label: "Credits", name: "credits", widget: "list", summary: "{{fields.role}} — {{fields.name}}", fields: [{ label: "Role", name: "role", widget: "string" }, { label: "Name", name: "name", widget: "string" }] }

  # ─── HOME PAGE ───
  - name: "home"
    label: "🏠 Home Page"
    files:
      - label: "Home Page Sections"
        name: "home"
        file: "src/content/pages/home.json"
        fields:
          - label: "1️⃣ Hero Section"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - { label: "👁️ Show this section", name: "visible", widget: "boolean", default: true }
              - label: "📝 Content"
                name: "content"
                widget: "object"
                fields:
                  - { label: "First Name (large text)", name: "name1", widget: "string", default: "Ahmed" }
                  - { label: "Last Name (accent color)", name: "name2", widget: "string", default: "Abuzenada" }
                  - { label: "Subtitle", name: "subtitle", widget: "string" }
                  - { label: "Description", name: "description", widget: "string" }
                  - { label: "Button Text", name: "buttonText", widget: "string", default: "View My Work" }
                  - { label: "🎬 Hero Video (scroll-driven)", name: "heroImage", widget: "file", hint: "Video plays frame-by-frame as user scrolls" }
                  - { label: "🎬 Banner Video (mid-page)", name: "bannerVideo", widget: "file", default: "/videos/banner.mp4" }
              - label: "📐 Spacing"
                name: "elements"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Title → margin bottom", name: "titleMarginBottom", widget: "number", default: 36 }
                  - { label: "Subtitle → margin bottom", name: "subtitleMarginBottom", widget: "number", default: 20 }
                  - { label: "Divider → margin Y", name: "dividerMarginY", widget: "number", default: 24 }
                  - { label: "Description → margin bottom", name: "descriptionMarginBottom", widget: "number", default: 36 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Align", name: "align", widget: "select", options: ["left", "center", "right"], default: "center" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 0 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 0 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 24 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 24 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 0 }
                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
                  - { label: "Margin Right", name: "marginRight", widget: "number", default: 0 }
                  - { label: "Grid Gap", name: "gridGap", widget: "number", default: 0 }
                  - { label: "↕️ Gap After Section", name: "gapAfter", widget: "number", default: 0, hint: "Space between this section and the next" }

          - label: "2️⃣ Featured Projects"
            name: "featured"
            widget: "object"
            collapsed: true
            fields:
              - { label: "👁️ Show this section", name: "visible", widget: "boolean", default: true }
              - label: "📝 Content"
                name: "content"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Button Text", name: "buttonText", widget: "string", default: "View All Work" }
              - label: "📐 Spacing"
                name: "elements"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Label → margin bottom", name: "labelMarginBottom", widget: "number", default: 12 }
                  - { label: "Title → margin bottom", name: "titleMarginBottom", widget: "number", default: 0 }
                  - { label: "Title → Grid gap", name: "titleToGridGap", widget: "number", default: 80 }
                  - { label: "Grid → Button gap", name: "gridToButtonGap", widget: "number", default: 112 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Title Align", name: "align", widget: "select", options: ["left", "center", "right"], default: "left" }
                  - { label: "Button Align", name: "buttonAlign", widget: "select", options: ["left", "center", "right"], default: "center" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 160 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 160 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 0 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 0 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 0 }
                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
                  - { label: "Margin Right", name: "marginRight", widget: "number", default: 0 }
                  - { label: "Grid Gap", name: "gridGap", widget: "number", default: 40 }
                  - { label: "↕️ Gap After Section", name: "gapAfter", widget: "number", default: 0, hint: "Space between this section and the next" }

          - label: "3️⃣ Video Banner"
            name: "videoBanner"
            widget: "object"
            collapsed: true
            fields:
              - { label: "👁️ Show this section", name: "visible", widget: "boolean", default: true }
              - label: "📝 Content"
                name: "content"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string", default: "Behind the Lens" }
                  - { label: "Title Part 1", name: "titlePart1", widget: "string", default: "Where Stories" }
                  - { label: "Title Part 2 (accent)", name: "titlePart2", widget: "string", default: "Come Alive" }
                  - { label: "🖼️ Fallback Image (mobile)", name: "fallbackImage", widget: "image", required: false, hint: "Shown on mobile instead of video" }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Height (vh)", name: "height", widget: "number", default: 65, hint: "Height as percentage of viewport" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 0 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 0 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 0 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 0 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 0 }
                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
                  - { label: "Margin Right", name: "marginRight", widget: "number", default: 0 }
                  - { label: "↕️ Gap After Section", name: "gapAfter", widget: "number", default: 0, hint: "Space between this section and the next" }

          - label: "4️⃣ Call to Action"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "👁️ Show this section", name: "visible", widget: "boolean", default: true }
              - label: "📝 Content"
                name: "content"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Button Text", name: "buttonText", widget: "string" }
              - label: "📐 Spacing"
                name: "elements"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Label → margin bottom", name: "labelMarginBottom", widget: "number", default: 32 }
                  - { label: "Title → margin bottom", name: "titleMarginBottom", widget: "number", default: 40 }
                  - { label: "Description → padding top", name: "descriptionPaddingTop", widget: "number", default: 36 }
                  - { label: "Description → margin bottom", name: "descriptionMarginBottom", widget: "number", default: 96 }
                  - { label: "Button → margin top", name: "buttonMarginTop", widget: "number", default: 20 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Align", name: "align", widget: "select", options: ["left", "center", "right"], default: "center" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 176 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 176 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 0 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 0 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 0 }
                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
                  - { label: "Margin Right", name: "marginRight", widget: "number", default: 0 }
                  - { label: "Grid Gap", name: "gridGap", widget: "number", default: 0 }
                  - { label: "↕️ Gap After Section", name: "gapAfter", widget: "number", default: 0, hint: "Space between this section and the next" }

  # ─── ABOUT PAGE ───
  - name: "about"
    label: "👤 About Page"
    files:
      - label: "About Page Sections"
        name: "about"
        file: "src/content/pages/about.json"
        fields:
          - label: "1️⃣ Hero Banner"
            name: "heroBanner"
            widget: "object"
            collapsed: true
            fields:
              - { label: "👁️ Show", name: "visible", widget: "boolean", default: true }
              - label: "📝 Content"
                name: "content"
                widget: "object"
                fields:
                  - { label: "Background Image", name: "heroBackground", widget: "image" }
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
              - label: "📐 Spacing"
                name: "elements"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Label → margin bottom", name: "labelMarginBottom", widget: "number", default: 16 }
                  - { label: "Title → margin bottom", name: "titleMarginBottom", widget: "number", default: 0 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Align", name: "align", widget: "select", options: ["left", "center", "right"], default: "left" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 0 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 48 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 0 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 0 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 0 }
                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
                  - { label: "Margin Right", name: "marginRight", widget: "number", default: 0 }
                  - { label: "Grid Gap", name: "gridGap", widget: "number", default: 0 }
                  - { label: "Gap After", name: "gapAfter", widget: "number", default: 0 }

          - label: "2️⃣ Introduction"
            name: "intro"
            widget: "object"
            collapsed: true
            fields:
              - { label: "👁️ Show", name: "visible", widget: "boolean", default: true }
              - label: "📝 Content"
                name: "content"
                widget: "object"
                fields:
                  - { label: "Paragraph 1", name: "text1", widget: "text" }
                  - { label: "Paragraph 2", name: "text2", widget: "text" }
              - label: "📐 Spacing"
                name: "elements"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Divider → margin bottom", name: "dividerMarginBottom", widget: "number", default: 32 }
                  - { label: "Text 1 → margin bottom", name: "text1MarginBottom", widget: "number", default: 24 }
                  - { label: "Text 2 → margin bottom", name: "text2MarginBottom", widget: "number", default: 0 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Align", name: "align", widget: "select", options: ["left", "center", "right"], default: "left" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 80 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 80 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 0 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 0 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 0 }
                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
                  - { label: "Margin Right", name: "marginRight", widget: "number", default: 0 }
                  - { label: "Grid Gap", name: "gridGap", widget: "number", default: 0 }
                  - { label: "Gap After", name: "gapAfter", widget: "number", default: 0 }

          - label: "3️⃣ Photo Gallery"
            name: "gallery"
            widget: "object"
            collapsed: true
            fields:
              - { label: "👁️ Show", name: "visible", widget: "boolean", default: true }
              - label: "📝 Content"
                name: "content"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Photos", name: "photos", widget: "list", field: { label: "Photo", name: "photo", widget: "image" } }
              - label: "📐 Spacing"
                name: "elements"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Label → margin bottom", name: "labelMarginBottom", widget: "number", default: 16 }
                  - { label: "Title → margin bottom", name: "titleMarginBottom", widget: "number", default: 48 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Align", name: "align", widget: "select", options: ["left", "center", "right"], default: "left" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 96 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 96 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 0 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 0 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 0 }
                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
                  - { label: "Margin Right", name: "marginRight", widget: "number", default: 0 }
                  - { label: "Grid Gap (photos)", name: "gridGap", widget: "number", default: 8 }
                  - { label: "Gap After", name: "gapAfter", widget: "number", default: 0 }

          - label: "4️⃣ Philosophy & Expertise"
            name: "philosophy"
            widget: "object"
            collapsed: true
            fields:
              - { label: "👁️ Show", name: "visible", widget: "boolean", default: true }
              - label: "📝 Content"
                name: "content"
                widget: "object"
                fields:
                  - { label: "Philosophy Title", name: "title1", widget: "string" }
                  - { label: "Philosophy Text 1", name: "text1", widget: "text" }
                  - { label: "Philosophy Text 2", name: "text2", widget: "text" }
                  - { label: "Expertise Title", name: "title2", widget: "string" }
                  - label: "Expertise Items"
                    name: "expertiseItems"
                    widget: "list"
                    summary: "{{fields.title}}"
                    fields:
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Description", name: "description", widget: "string" }
              - label: "📐 Spacing"
                name: "elements"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Title → margin bottom", name: "titleMarginBottom", widget: "number", default: 24 }
                  - { label: "Divider → margin bottom", name: "dividerMarginBottom", widget: "number", default: 32 }
                  - { label: "Text 1 → margin bottom", name: "text1MarginBottom", widget: "number", default: 24 }
                  - { label: "Expertise item → padding bottom", name: "expertiseItemPaddingBottom", widget: "number", default: 24 }
                  - { label: "Expertise items → gap", name: "expertiseItemGap", widget: "number", default: 32 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Align", name: "align", widget: "select", options: ["left", "center", "right"], default: "left" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 96 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 96 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 0 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 0 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 0 }
                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
                  - { label: "Margin Right", name: "marginRight", widget: "number", default: 0 }
                  - { label: "Grid Gap (columns)", name: "gridGap", widget: "number", default: 80 }
                  - { label: "Gap After", name: "gapAfter", widget: "number", default: 0 }

          - label: "5️⃣ Career Timeline"
            name: "timeline"
            widget: "object"
            collapsed: true
            fields:
              - { label: "👁️ Show", name: "visible", widget: "boolean", default: true }
              - label: "📝 Content"
                name: "content"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - label: "Milestones"
                    name: "milestones"
                    widget: "list"
                    summary: "{{fields.year}} — {{fields.title}}"
                    fields:
                      - { label: "Year", name: "year", widget: "string" }
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Description", name: "description", widget: "text" }
              - label: "📐 Spacing"
                name: "elements"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Label → margin bottom", name: "labelMarginBottom", widget: "number", default: 16 }
                  - { label: "Title → margin bottom", name: "titleMarginBottom", widget: "number", default: 64 }
                  - { label: "Year → margin bottom", name: "yearMarginBottom", widget: "number", default: 12 }
                  - { label: "Item title → margin bottom", name: "itemTitleMarginBottom", widget: "number", default: 12 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Align", name: "align", widget: "select", options: ["left", "center", "right"], default: "left" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 96 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 96 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 0 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 0 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 0 }
                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
                  - { label: "Margin Right", name: "marginRight", widget: "number", default: 0 }
                  - { label: "Grid Gap (items)", name: "gridGap", widget: "number", default: 64 }
                  - { label: "Gap After", name: "gapAfter", widget: "number", default: 0 }

          - label: "6️⃣ Quote"
            name: "quote"
            widget: "object"
            collapsed: true
            fields:
              - { label: "👁️ Show", name: "visible", widget: "boolean", default: true }
              - label: "📝 Content"
                name: "content"
                widget: "object"
                fields:
                  - { label: "Quote Text", name: "text", widget: "string" }
                  - { label: "Author", name: "author", widget: "string" }
              - label: "📐 Spacing"
                name: "elements"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Icon → margin bottom", name: "iconMarginBottom", widget: "number", default: 32 }
                  - { label: "Quote → margin bottom", name: "quoteMarginBottom", widget: "number", default: 32 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Align", name: "align", widget: "select", options: ["left", "center", "right"], default: "center" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 112 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 112 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 0 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 0 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 0 }
                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
                  - { label: "Margin Right", name: "marginRight", widget: "number", default: 0 }
                  - { label: "Grid Gap", name: "gridGap", widget: "number", default: 0 }
                  - { label: "Gap After", name: "gapAfter", widget: "number", default: 0 }

  # ─── WORK PAGE (detail spacing) ───
  - name: "workpage"
    label: "🎬 Portfolio Page"
    files:
      - label: "Project Detail Spacing"
        name: "work"
        file: "src/content/pages/work.json"
        fields:
          - label: "📐 Project Detail Page"
            name: "detail"
            widget: "object"
            fields:
              - { label: "Top Spacer", name: "topSpacerHeight", widget: "number", default: 100 }
              - { label: "Back Button — size", name: "backButtonSize", widget: "select", options: ["text-xs", "text-sm", "text-base", "text-lg"], default: "text-sm" }
              - { label: "Back Button — padding Y", name: "backButtonPaddingY", widget: "number", default: 12 }
              - { label: "Back Button — padding X", name: "backButtonPaddingX", widget: "number", default: 24 }
              - { label: "Video → margin below", name: "videoMarginBottom", widget: "number", default: 48 }
              - { label: "Category → margin below", name: "categoryMarginBottom", widget: "number", default: 16 }
