                  - { label: "Item title → margin bottom (px)", name: "itemTitleMarginBottom", widget: "number", default: 12 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "▸ Position", name: "align", widget: "select", options: ["left", "center", "right"], default: "left" }
