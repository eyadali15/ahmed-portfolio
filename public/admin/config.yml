                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
                  - { label: "Margin Right", name: "marginRight", widget: "number", default: 0 }
                  - { label: "Grid Gap (between photos)", name: "gridGap", widget: "number", default: 8 }
                  - { label: "Gap After Section", name: "gapAfter", widget: "number", default: 0 }

          - label: "4️⃣ Philosophy & Expertise"
            name: "philosophy"
            widget: "object"
            collapsed: true
            fields:
              - label: "📝 Content"
                name: "content"
                widget: "object"
