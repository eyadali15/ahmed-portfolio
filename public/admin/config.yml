                  - { label: "Label → margin bottom (px)", name: "labelMarginBottom", widget: "number", default: 16 }
                  - { label: "Title → margin bottom (px)", name: "titleMarginBottom", widget: "number", default: 0 }
              - label: "📐 Section Layout"
                name: "layout"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "▸ Position", name: "align", widget: "select", options: ["left", "center", "right"], default: "left" }
                  - { label: "Padding Top", name: "paddingTop", widget: "number", default: 0 }
                  - { label: "Padding Bottom", name: "paddingBottom", widget: "number", default: 48 }
                  - { label: "Padding Left", name: "paddingLeft", widget: "number", default: 0 }
                  - { label: "Padding Right", name: "paddingRight", widget: "number", default: 0 }
                  - { label: "Margin Top", name: "marginTop", widget: "number", default: 0 }
                  - { label: "Margin Bottom", name: "marginBottom", widget: "number", default: 0 }
                  - { label: "Margin Left", name: "marginLeft", widget: "number", default: 0 }
