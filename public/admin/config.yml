                  - { label: "Philosophy Text 1", name: "text1", widget: "text" }
                  - { label: "Philosophy Text 2", name: "text2", widget: "text" }
                  - { label: "Expertise Title", name: "title2", widget: "string" }
              - label: "🔤 Element Spacing"
                name: "elements"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Title → margin bottom (px)", name: "titleMarginBottom", widget: "number", default: 24 }
                  - { label: "Divider → margin bottom (px)", name: "dividerMarginBottom", widget: "number", default: 32 }
                  - { label: "Text 1 → margin bottom (px)", name: "text1MarginBottom", widget: "number", default: 24 }
                  - { label: "Expertise item → padding bottom (px)", name: "expertiseItemPaddingBottom", widget: "number", default: 24 }
